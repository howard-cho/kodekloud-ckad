apiVersion: v1
kind: LimitRange
metadata:
  name: resource-constraint
spec:
  limits:
    - default:
        cpu: "500m"
        memory: 1Gi
      defaultRequest:
        cpu: "500m"
        memory: 1Gi
      max:
        cpu: "1"
        memory: 1Gi
      min:
        cpu: "100m"
        memory: 0.5Gi
      type: Container
